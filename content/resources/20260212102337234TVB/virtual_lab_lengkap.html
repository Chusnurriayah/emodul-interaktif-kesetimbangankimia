<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Virtual Lab Kesetimbangan</title>

<style>
body{
    font-family:Arial;
    text-align:center;
    background:linear-gradient(to right,#667eea,#764ba2);
    padding:20px;
}

.container{
    background:white;
    border-radius:20px;
    padding:20px;
    width:90%;
    margin:auto;
}

.controls{
    display:grid;
    grid-template-columns:repeat(5,1fr);
    gap:20px;
    margin-top:20px;
}

.lab{
    margin-top:40px;
    display:flex;
    justify-content:center;
}

.flask{
    width:220px;
    height:280px;
    border:5px solid #333;
    border-bottom-left-radius:120px;
    border-bottom-right-radius:120px;
    position:relative;
    overflow:hidden;
    background:#f1f3f5;
    transition:all 0.6s ease;
}

.liquid{
    position:absolute;
    bottom:0;
    width:100%;
    height:70%;
    background:#ffd43b;
    transition:all 0.6s ease;
}

.particle{
    width:18px;
    height:18px;
    border-radius:50%;
    position:absolute;
    animation:float 3s infinite alternate ease-in-out;
}

.A{background:#c92a2a;}
.B{background:#e67700;}
.C{background:#0ca678;}

@keyframes float{
    from{transform:translateY(0px);}
    to{transform:translateY(-15px);}
}

.status{
    margin-top:20px;
    font-size:18px;
    font-weight:bold;
}

.legend{
    margin-top:25px;
    text-align:left;
    display:inline-block;
    background:#f8f9fa;
    padding:15px;
    border-radius:10px;
}

.box{
    width:20px;
    height:20px;
    display:inline-block;
    margin-right:8px;
}

.red{background:#ff4d4f;}
.green{background:#4ecdc4;}
.yellow{background:#ffd43b;}
</style>
</head>

<body>

<div class="container">
<h2>Virtual Lab Kesetimbangan Kimia</h2>
<p>2A(g) + B(g) ⇌ 2C(g) (Eksoterm)</p>

<div class="controls">

<div>
<label>Suhu</label><br>
<input type="range" id="suhu" min="0" max="500" value="250" oninput="update()">
<p id="suhuVal">250</p>
</div>

<div>
<label>[A]</label><br>
<input type="range" id="A" min="1" max="5" value="3" oninput="update()">
<p id="AVal">3</p>
</div>

<div>
<label>[C]</label><br>
<input type="range" id="C" min="1" max="5" value="3" oninput="update()">
<p id="CVal">3</p>
</div>

<div>
<label>Tekanan</label><br>
<input type="range" id="P" min="1" max="10" value="5" oninput="update()">
<p id="PVal">5</p>
</div>

<div>
<label>Volume</label><br>
<input type="range" id="V" min="1" max="10" value="5" oninput="update()">
<p id="VVal">5</p>
</div>

</div>

<div class="lab">
<div class="flask" id="flask">
<div class="liquid" id="liquid"></div>
<div id="particles"></div>
</div>
</div>

<div class="status" id="status">
Kesetimbangan Awal
</div>

<div class="legend">
<b>Keterangan Warna:</b><br><br>
<span class="box red"></span> Merah = Bergeser ke kiri<br><br>
<span class="box green"></span> Hijau = Bergeser ke kanan<br><br>
<span class="box yellow"></span> Kuning = Setimbang
</div>

</div>

<script>

function randomPos(){
    return Math.random()*180;
}

function buatPartikel(jA,jB,jC){
    let container=document.getElementById("particles");
    container.innerHTML="";
    for(let i=0;i<jA;i++){
        container.innerHTML+=`<div class="particle A" style="left:${randomPos()}px;top:${randomPos()}px;"></div>`;
    }
    for(let i=0;i<jB;i++){
        container.innerHTML+=`<div class="particle B" style="left:${randomPos()}px;top:${randomPos()}px;"></div>`;
    }
    for(let i=0;i<jC;i++){
        container.innerHTML+=`<div class="particle C" style="left:${randomPos()}px;top:${randomPos()}px;"></div>`;
    }
}

function update(){

    let suhu=parseInt(document.getElementById("suhu").value);
    let A=parseInt(document.getElementById("A").value);
    let C=parseInt(document.getElementById("C").value);
    let P=parseInt(document.getElementById("P").value);
    let V=parseInt(document.getElementById("V").value);

    document.getElementById("suhuVal").innerHTML=suhu;
    document.getElementById("AVal").innerHTML=A;
    document.getElementById("CVal").innerHTML=C;
    document.getElementById("PVal").innerHTML=P;
    document.getElementById("VVal").innerHTML=V;

    let score=0;

    // SUHU (eksoterm)
    if(suhu>300) score-=1;
    if(suhu<200) score+=1;

    // Konsentrasi
    if(A>3) score+=1;
    if(C>3) score-=1;

    // Tekanan
    if(P>6) score+=1;
    if(P<4) score-=1;

    // Volume (mol kiri 3, mol kanan 2)
    if(V<4) score+=1;   // volume kecil → kanan
    if(V>7) score-=1;   // volume besar → kiri

    let liquid=document.getElementById("liquid");
    let status=document.getElementById("status");
    let flask=document.getElementById("flask");

    flask.style.transform="scaleY("+(1+(5-V)/20)+")";

    if(score>0){
        liquid.style.background="#4ecdc4";
        status.innerHTML="Bergeser ke KANAN (Produk dominan)";
        status.style.color="#0ca678";
        buatPartikel(1,1,6);
    }
    else if(score<0){
        liquid.style.background="#ff4d4f";
        status.innerHTML="Bergeser ke KIRI (Reaktan dominan)";
        status.style.color="#ff4d4f";
        buatPartikel(6,3,1);
    }
    else{
        liquid.style.background="#ffd43b";
        status.innerHTML="Setimbang";
        status.style.color="black";
        buatPartikel(3,2,3);
    }
}

update();
</script>

</body>
</html>
